<style>
/* ============================================================
   TechDaily · No Update Page
   ============================================================ */

:root {
  --ink: #1a1a1a;
  --ink-soft: #2b251f;
  --ink-muted: #6b6358;
  --paper: #f5f1e8;
  --paper-warm: #efe9dc;
  --paper-card: #fffdf8;
  --paper-dark: #e0d8c8;
  --accent: #8b1a1a;
  --accent-soft: #c44d4d;
  --accent-bg: rgba(139, 26, 26, 0.06);
  --rule: #c8c0b0;
  --rule-soft: #ddd6c8;
  --font-serif: 'Noto Serif SC', 'Playfair Display', Georgia, 'Songti SC', serif;
  --font-display: 'Playfair Display', 'Noto Serif SC', Georgia, serif;
  --font-sans: 'DM Sans', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', Consolas, 'Courier New', monospace;
  --max-width: 1280px;
  --reading-width: 720px;
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
  --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
  --shadow-xl: 0 16px 48px rgba(0, 0, 0, 0.16);
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --transition-fast: 0.2s ease;
  --transition-base: 0.3s ease;
  --transition-slow: 0.5s ease;
  --gradient-warm: linear-gradient(135deg, var(--paper-card) 0%, var(--paper-warm) 100%);
  --gradient-accent: linear-gradient(135deg, #8b1a1a 0%, #c44d4d 100%);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-sans);
  color: var(--ink);
  background: var(--paper);
  line-height: 1.7;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ============================================================
   1. MASTHEAD (Navigation)
   ============================================================ */

.masthead {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--ink);
  border-bottom: 1px solid rgba(245, 241, 232, 0.08);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.masthead-inner {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 12px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.masthead-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.masthead-brand-icon {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  color: var(--paper);
  font-family: var(--font-display);
  font-weight: 700;
  flex-shrink: 0;
}

.masthead-title {
  font-family: var(--font-display);
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--paper);
  letter-spacing: 0.02em;
}

.masthead-title .accent {
  color: var(--accent-soft);
  font-weight: 900;
}

.masthead-sub {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--ink-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 2px;
}

.masthead-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.archive-dropdown { position: relative; }

.archive-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: var(--paper);
  padding: 6px 12px;
  border-radius: var(--radius-md);
  cursor: pointer;
  font-family: var(--font-sans);
  font-size: 0.82rem;
  transition: all var(--transition-fast);
  white-space: nowrap;
}

.archive-toggle:hover {
  background: rgba(255, 255, 255, 0.14);
  border-color: rgba(255, 255, 255, 0.25);
}

.archive-toggle:active { transform: scale(0.97); }

.archive-arrow {
  width: 12px;
  height: 12px;
  transition: transform var(--transition-fast);
  opacity: 0.7;
}

.archive-dropdown.open .archive-arrow {
  transform: rotate(180deg);
}

.archive-menu {
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  width: 240px;
  max-height: 320px;
  overflow-y: auto;
  background: var(--paper-card);
  border: 1px solid var(--rule-soft);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg);
  padding: 10px 0;
  opacity: 0;
  visibility: hidden;
  transform: translateY(-6px);
  transition: all var(--transition-fast);
  z-index: 110;
}

.archive-dropdown.open .archive-menu {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

.archive-menu-title {
  font-family: var(--font-display);
  font-size: 0.88rem;
  font-weight: 700;
  color: var(--ink);
  padding: 6px 16px 10px;
  border-bottom: 1px solid var(--rule-soft);
  margin-bottom: 6px;
}

.archive-item {
  display: block;
  padding: 7px 16px;
  color: var(--ink-soft);
  text-decoration: none;
  font-size: 0.85rem;
  font-family: var(--font-sans);
  transition: all var(--transition-fast);
  border-radius: 0;
}

.archive-item:hover {
  background: var(--accent-bg);
  color: var(--accent);
}

.archive-item-current {
  font-weight: 600;
  color: var(--accent);
  cursor: default;
}

/* ============================================================
   2. HERO — 暂无更新主视觉
   ============================================================ */

.no-update-hero {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 80px 24px 60px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.no-update-hero::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -20%;
  width: 140%;
  height: 100%;
  background: radial-gradient(ellipse at 50% 30%, rgba(139, 26, 26, 0.04) 0%, transparent 60%);
  pointer-events: none;
}

.no-update-hero-inner {
  position: relative;
  z-index: 1;
}

/* —— 艺术化图标 —— */
.no-update-icon {
  width: 140px;
  height: 140px;
  margin: 0 auto 36px;
  position: relative;
}

.no-update-icon svg {
  width: 100%;
  height: 100%;
}

/* 咖啡杯热气动画 */
@keyframes steamFloat {
  0%, 100% { transform: translateY(0) opacity(0.4); }
  50% { transform: translateY(-6px) opacity(0.7); }
}

.no-update-icon .steam-1 {
  animation: steamFloat 2.5s ease-in-out infinite;
}
.no-update-icon .steam-2 {
  animation: steamFloat 2.5s ease-in-out 0.5s infinite;
}
.no-update-icon .steam-3 {
  animation: steamFloat 2.5s ease-in-out 1s infinite;
}

/* Zzz 呼吸动画 */
@keyframes zzzFloat {
  0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
  50% { transform: translateY(-4px) scale(1.1); opacity: 0.6; }
}

.no-update-icon .zzz-1 {
  animation: zzzFloat 3s ease-in-out infinite;
}
.no-update-icon .zzz-2 {
  animation: zzzFloat 3s ease-in-out 0.6s infinite;
}
.no-update-icon .zzz-3 {
  animation: zzzFloat 3s ease-in-out 1.2s infinite;
}

/* —— 主标题 —— */
.no-update-title {
  font-family: var(--font-serif);
  font-size: 2.8rem;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 0.06em;
  margin-bottom: 16px;
  line-height: 1.2;
}

.no-update-title .accent-line {
  display: block;
  width: 60px;
  height: 3px;
  background: var(--gradient-accent);
  margin: 20px auto 0;
  border-radius: 2px;
}

/* —— 副标题 —— */
.no-update-subtitle {
  font-family: var(--font-sans);
  font-size: 1.05rem;
  color: var(--ink-muted);
  max-width: 480px;
  margin: 0 auto 8px;
  line-height: 1.7;
}

.no-update-hint {
  font-family: var(--font-mono);
  font-size: 0.82rem;
  color: var(--ink-muted);
  opacity: 0.7;
  margin-top: 8px;
}

/* —— 日期徽章 —— */
.no-update-date-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--paper-card);
  border: 1px solid var(--rule-soft);
  border-radius: 50px;
  padding: 8px 20px;
  margin-top: 32px;
  font-family: var(--font-sans);
  font-size: 0.88rem;
  color: var(--ink-muted);
  box-shadow: var(--shadow-sm);
}

.no-update-date-badge .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent-soft);
  opacity: 0.6;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0.4; transform: scale(1); }
  50% { opacity: 0.8; transform: scale(1.2); }
}

/* ============================================================
   3. 历史回顾区 (History Cards)
   ============================================================ */

.history-section {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 40px 24px 80px;
}

.history-section-header {
  text-align: center;
  margin-bottom: 48px;
}

.history-section-title {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 0.02em;
  margin-bottom: 8px;
}

.history-section-subtitle {
  font-family: var(--font-sans);
  font-size: 0.9rem;
  color: var(--ink-muted);
}

.history-section-subtitle .rule-line {
  display: inline-block;
  width: 40px;
  height: 1px;
  background: var(--rule);
  vertical-align: middle;
  margin: 0 10px;
}

/* —— 卡片网格 —— */
.history-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 24px;
}

.history-card {
  background: var(--paper-card);
  border: 1px solid var(--rule-soft);
  border-radius: var(--radius-lg);
  padding: 28px 24px;
  text-decoration: none;
  color: var(--ink);
  transition: all var(--transition-base);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 160px;
}

.history-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--gradient-accent);
  opacity: 0;
  transition: opacity var(--transition-base);
}

.history-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
  border-color: var(--rule);
}

.history-card:hover::before {
  opacity: 1;
}

.history-card-date {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--accent);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 12px;
  font-weight: 600;
}

.history-card-weekday {
  font-family: var(--font-sans);
  font-size: 0.8rem;
  color: var(--ink-muted);
  margin-left: 6px;
  font-weight: 400;
  text-transform: none;
}

.history-card-title {
  font-family: var(--font-serif);
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.45;
  margin-bottom: 12px;
  flex-grow: 1;
}

.history-card-meta {
  font-family: var(--font-sans);
  font-size: 0.82rem;
  color: var(--ink-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

.history-card-arrow {
  margin-left: auto;
  width: 20px;
  height: 20px;
  opacity: 0;
  transform: translateX(-4px);
  transition: all var(--transition-base);
  color: var(--accent);
}

.history-card:hover .history-card-arrow {
  opacity: 1;
  transform: translateX(0);
}

/* 加载中占位 */
.history-loading {
  text-align: center;
  padding: 60px 24px;
  color: var(--ink-muted);
  font-family: var(--font-sans);
  font-size: 0.95rem;
}

.history-loading-spinner {
  width: 32px;
  height: 32px;
  border: 2px solid var(--rule-soft);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ============================================================
   4. FOOTER
   ============================================================ */

.footer {
  border-top: 1px solid var(--rule);
  padding: 48px 24px;
  text-align: center;
  background: var(--paper-warm);
}

.footer-inner {
  max-width: var(--max-width);
  margin: 0 auto;
}

.footer-brand {
  font-family: var(--font-display);
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 8px;
}

.footer-brand .accent { color: var(--accent); }

.footer-desc {
  font-family: var(--font-sans);
  font-size: 0.85rem;
  color: var(--ink-muted);
  margin-bottom: 20px;
}

.footer-links {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.footer-link {
  font-family: var(--font-sans);
  font-size: 0.82rem;
  color: var(--ink-muted);
  text-decoration: none;
  transition: color var(--transition-fast);
}

.footer-link:hover { color: var(--accent); }

.footer-copyright {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--ink-muted);
  opacity: 0.6;
  letter-spacing: 0.04em;
}

/* ============================================================
   5. RESPONSIVE
   ============================================================ */

@media (max-width: 768px) {
  .no-update-hero { padding: 56px 20px 40px; }
  .no-update-title { font-size: 2rem; }
  .no-update-icon { width: 110px; height: 110px; }
  .history-grid { grid-template-columns: 1fr; gap: 16px; }
  .history-section { padding: 32px 20px 56px; }
  .masthead-inner { padding: 10px 16px; }
  .masthead-title { font-size: 1rem; }
  .archive-toggle { padding: 5px 10px; font-size: 0.75rem; }
  .history-card { padding: 22px 20px; }
}

@media (max-width: 480px) {
  .no-update-title { font-size: 1.6rem; }
  .no-update-subtitle { font-size: 0.95rem; }
  .history-section-title { font-size: 1.25rem; }
}

/* ============================================================
   6. REDUCED MOTION
   ============================================================ */

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>

<script>
(function() {

  // ============================================================

  function setTodayDate() {
    var now = new Date();
    var y = now.getFullYear();
    var m = String(now.getMonth() + 1).padStart(2, '0');
    var d = String(now.getDate()).padStart(2, '0');
    var weekDays = ['日', '一', '二', '三', '四', '五', '六'];
    var w = weekDays[now.getDay()];
    document.getElementById('todayDate').textContent = y + '年' + m + '月' + d + '日 · 星期' + w;
    document.body.setAttribute('data-date', y + '-' + m + '-' + d);
  }

  // ============================================================
  // 2. 扫描历史日报（动态探测）
  // ============================================================
  function scanHistory() {
    var grid = document.getElementById('historyGrid');
    var today = new Date();
    var weekDays = ['日', '一', '二', '三', '四', '五', '六'];
    var cards = [];
    var checkedCount = 0;
    var totalCheck = 7; // 检查最近7天

    function checkDate(offset) {
      var d = new Date(today);
      d.setDate(d.getDate() - offset);
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1).padStart(2, '0');
      var day = String(d.getDate()).padStart(2, '0');
      var urlPath = '/' + y + '/' + m + '/' + day + '/';
      var dateStr = y + '年' + m + '月' + day + '日';
      var weekDay = weekDays[d.getDay()];

      // 用 fetch 探测该日期是否存在（HEAD 请求）
      fetch(urlPath, { method: 'HEAD', mode: 'no-cors' })
        .then(function() {
          // 即使 no-cors 返回 opaque，只要没抛异常就认为存在
          cards.push({
            offset: offset,
            url: urlPath,
            dateStr: dateStr,
            weekDay: weekDay,
            y: y, m: m, day: day
          });
        })
        .catch(function() {
          // 不存在，跳过
        })
        .finally(function() {
          checkedCount++;
          if (checkedCount >= totalCheck) {
            renderCards();
          }
        });
    }

    function renderCards() {
      if (cards.length === 0) {
        grid.innerHTML = '<div class="history-loading"><p>暂无历史日报</p></div>';
        return;
      }

      // 按日期排序（从近到远）
      cards.sort(function(a, b) { return a.offset - b.offset; });

      var html = '';
      for (var i = 0; i < cards.length; i++) {
        var c = cards[i];
        html +=
          '<a href="' + c.url + '" class="history-card">' +
            '<div class="history-card-date">' +
              c.dateStr +
              '<span class="history-card-weekday">星期' + c.weekDay + '</span>' +
            '</div>' +
            '<div class="history-card-title">第 ' + c.y + c.m + c.day + ' 期</div>' +
            '<div class="history-card-meta">' +
              '浏览日报' +
              '<svg class="history-card-arrow" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">' +
                '<path d="M4 10h12M12 6l4 4-4 4" stroke-linecap="round" stroke-linejoin="round"/>' +
              '</svg>' +
            '</div>' +
          '</a>';
      }
      grid.innerHTML = html;
    }

    // 检查最近7天（不含今天）
    for (var i = 1; i <= totalCheck; i++) {
      checkDate(i);
    }
  }

  // ============================================================
  // 3. 往期下拉菜单（复用日报逻辑）
  // ============================================================
  window.toggleArchive = function() {
    var dropdown = document.getElementById('archiveDropdown');
    if (!dropdown) return;
    dropdown.classList.toggle('open');
  };

  function initArchiveMenu() {
    var listEl = document.getElementById('archiveList');
    if (!listEl) return;

    var today = new Date();
    var weekDays = ['日', '一', '二', '三', '四', '五', '六'];
    var html = '';

    for (var i = 1; i <= 7; i++) {
      var d = new Date(today);
      d.setDate(d.getDate() - i);
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1).padStart(2, '0');
      var day = String(d.getDate()).padStart(2, '0');
      var dateStr = y + '年' + m + '月' + day + '日';
      var urlPath = '/' + y + '/' + m + '/' + day + '/';
      var weekDay = weekDays[d.getDay()];
      html += '<a class="archive-item" href="' + urlPath + '">' + dateStr + ' 星期' + weekDay + '</a>';
    }

    listEl.innerHTML = html;
  }

  // 点击外部关闭下拉
  document.addEventListener('click', function(e) {
    var dropdown = document.getElementById('archiveDropdown');
    if (dropdown && !dropdown.contains(e.target)) {
      dropdown.classList.remove('open');
    }
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      var dropdown = document.getElementById('archiveDropdown');
      if (dropdown) dropdown.classList.remove('open');
    }
  });

  // ============================================================
  // INIT
  // ============================================================
  setTodayDate();
  initArchiveMenu();
  scanHistory();

})();
</script>

</body>
</html>
