<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>TechDaily · 2026年6月15日</title>
<link rel="icon" type="image/svg+xml" href="/assets/logo/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Noto+Serif+SC:wght@400;600;700;900&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/**
 * ============================================================
 * TechDaily UI Design Enhancement Stylesheet
 * ============================================================
 * This file contains all visual enhancements for the TechDaily
 * newspaper-style tech news page. It is designed to be used
 * alongside the existing HTML structure.
 *
 * Sections:
 * 1. CSS Custom Properties (Variables)
 * 2. Global Typography & Base Styles
 * 3. Floating Navigation
 * 4. Masthead (Header)
 * 5. Hero Section
 * 6. Category Pills
 * 7. Today's Brief Section
 * 8. Audio Player
 * 9. Section Dividers (Decorative)
 * 10. Stories (Detailed Articles)
 * 11. Tech Terms & Tooltips
 * 12. Modal Enhancements
 * 13. Footer
 * 14. Back to Top Button
 * 15. Scroll Animations (Reveal)
 * 16. Decorative Elements
 * 17. Keyframes
 * 18. Responsive Design
 * 19. Reduced Motion Support
 * ============================================================
 */


/* ============================================================
   1. CSS CUSTOM PROPERTIES (VARIABLES)
   ============================================================ */

:root {
  /* -- Core Colors (preserved + enhanced) -- */
  --ink: #1a1a1a;
  --ink-soft: #2b251f;
  --ink-muted: #6b6358;
  --paper: #f5f1e8;
  --paper-warm: #efe9dc;
  --paper-card: #fffdf8;
  --paper-dark: #e0d8c8;
  --accent: #8b1a1a;
  --accent-soft: #c44d4d;
  --accent-bg: rgba(139, 26, 26, 0.06);
  --rule: #c8c0b0;
  --rule-soft: #ddd6c8;

  /* -- Typography (preserved) -- */
  --font-serif: 'Noto Serif SC', 'Playfair Display', Georgia, 'Songti SC', serif;
  --font-display: 'Playfair Display', 'Noto Serif SC', Georgia, serif;
  --font-sans: 'DM Sans', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', Consolas, 'Courier New', monospace;

  /* -- Layout (enhanced) -- */
  --max-width: 1280px;
  --reading-width: 720px;

  /* -- Shadow System (NEW) -- */
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
  --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
  --shadow-xl: 0 16px 48px rgba(0, 0, 0, 0.16);
  --shadow-inset: inset 0 1px 3px rgba(0, 0, 0, 0.03);

  /* -- Gradients (NEW) -- */
  --gradient-warm: linear-gradient(135deg, var(--paper-card) 0%, var(--paper-warm) 100%);
  --gradient-paper: linear-gradient(180deg, var(--paper-card) 0%, var(--paper) 100%);
  --gradient-accent: linear-gradient(135deg, var(--accent) 0%, var(--accent-soft) 100%);
  --gradient-rule: linear-gradient(90deg, transparent 0%, var(--rule) 50%, transparent 100%);
  --gradient-overlay: linear-gradient(180deg, rgba(26, 26, 26, 0.03) 0%, transparent 100%);

  /* -- Spacing Scale (NEW) -- */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 40px;
  --space-3xl: 56px;

  /* -- Border Radius (NEW) -- */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* -- Transitions (NEW) -- */
  --transition-fast: 150ms ease;
  --transition-base: 250ms ease;
  --transition-slow: 400ms ease;
  --transition-bounce: 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
}


/* ============================================================
   2. GLOBAL TYPOGRAPHY & BASE STYLES
   ============================================================ */

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
  -webkit-text-size-adjust: 100%;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

body {
  font-family: var(--font-sans);
  background: var(--paper);
  color: var(--ink);
  line-height: 1.6;
  overflow-x: hidden;
}

img {
  max-width: 100%;
  height: auto;
  display: block;
}

a {
  color: inherit;
  text-decoration: none;
}

/* -- Selection Styling (NEW) -- */
::selection {
  background: var(--accent);
  color: var(--paper-card);
}

::-moz-selection {
  background: var(--accent);
  color: var(--paper-card);
}

/* -- Scrollbar Styling (NEW) -- */
::-webkit-scrollbar {
  width: 6px;
}

::-webkit-scrollbar-track {
  background: var(--paper);
}

::-webkit-scrollbar-thumb {
  background: var(--rule);
  border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--ink-muted);
}


/* ============================================================
   3. FLOATING NAVIGATION
   ============================================================ */

.float-nav {
  position: fixed;
  top: 80px;
  left: 20px;
  z-index: 50;
}

.float-btn {
  width: 48px;
  height: 48px;
  border-radius: var(--radius-full);
  background: var(--ink);
  color: var(--paper);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-md);
  font-size: 1.2rem;
  transition: all var(--transition-base);
  position: relative;
  overflow: hidden;
}

.float-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--gradient-accent);
  opacity: 0;
  transition: opacity var(--transition-base);
  border-radius: inherit;
  z-index: -1;
}

.float-btn:hover {
  transform: scale(1.1) rotate(2deg);
  box-shadow: var(--shadow-lg);
}

.float-btn:hover::after {
  opacity: 1;
}

.float-btn:active {
  transform: scale(0.96);
}

/* -- Sidebar -- */
.sidebar {
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  width: 280px;
  background: var(--paper-card);
  box-shadow: 4px 0 32px rgba(0, 0, 0, 0.14);
  z-index: 300;
  transform: translateX(-100%);
  transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  padding: 24px;
  overflow-y: auto;
  border-right: 1px solid var(--rule-soft);
}

.sidebar.active {
  transform: translateX(0);
}

.sidebar-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.35);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  z-index: 299;
  display: none;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.sidebar-overlay.active {
  display: block;
  opacity: 1;
}

.sidebar-title {
  font-family: var(--font-display);
  font-size: 1.15rem;
  font-weight: 700;
  margin-bottom: 20px;
  padding-bottom: 14px;
  border-bottom: 2px solid var(--ink);
  letter-spacing: 0.01em;
}

.sidebar-cat {
  margin-bottom: 18px;
}

.sidebar-cat-name {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.sidebar-cat-name::before {
  content: '';
  display: inline-block;
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  opacity: 0.6;
}

.sidebar-link {
  display: block;
  font-size: 0.88rem;
  color: var(--ink-soft);
  padding: 5px 0;
  cursor: pointer;
  transition: all var(--transition-fast);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border-left: 2px solid transparent;
  padding-left: 8px;
  margin-left: -8px;
}

.sidebar-link:hover {
  color: var(--accent);
  border-left-color: var(--accent-soft);
  background: var(--accent-bg);
  border-radius: 0 4px 4px 0;
}


/* ============================================================
   4. MASTHEAD (HEADER)
   ============================================================ */

.masthead {
  background: var(--ink);
  color: var(--paper);
  padding: 16px 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 24px rgba(0, 0, 0, 0.14);
  transition: box-shadow var(--transition-base);
}

.masthead-inner {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.masthead-brand {
  display: flex;
  align-items: baseline;
  gap: 10px;
}

.masthead-title {
  font-family: var(--font-display);
  font-size: clamp(1.4rem, 3.5vw, 2.4rem);
  font-weight: 900;
  letter-spacing: 0.02em;
  line-height: 1;
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
}

.masthead-title .accent {
  color: var(--accent-soft);
  text-shadow: 0 0 20px rgba(196, 77, 77, 0.3);
}

.masthead-sub {
  font-family: var(--font-serif);
  font-size: 0.8rem;
  font-style: italic;
  opacity: 0.5;
  letter-spacing: 0.02em;
}

.masthead-date {
  font-family: var(--font-mono);
  font-size: 0.76rem;
  opacity: 0.6;
  text-align: right;
  letter-spacing: 0.02em;
  line-height: 1.5;
}

/* —— 往期回顾导航按钮（v2026-06-25 新增） —— */
.masthead-nav {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
  margin-right: 24px;
}

.masthead-nav-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 12px;
  font-family: var(--font-sans);
  font-size: 0.82rem;
  color: var(--paper);
  text-decoration: none;
  border-radius: var(--radius-md);
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.15);
  transition: all var(--transition-fast);
  white-space: nowrap;
}

.masthead-nav-link:hover {
  background: rgba(255, 255, 255, 0.14);
  border-color: rgba(255, 255, 255, 0.25);
}

.masthead-nav-link:active { transform: scale(0.97); }

.masthead-nav-link svg {
  width: 12px;
  height: 12px;
  opacity: 0.85;
}

@media (max-width: 767px) {
  .masthead-nav-link span { display: none; }
  .masthead-nav { margin-right: 16px; }
  .masthead-nav-link { padding: 6px 9px; }
}


/* ============================================================
   5. HERO SECTION
   ============================================================ */

.hero {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 32px 24px 16px;
  position: relative;
}

.hero-cover {
  width: 100%;
  max-height: min(42vh, 420px);
  object-fit: cover;
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-md);
  transition: box-shadow var(--transition-base);
  position: relative;
}

/* -- Hero subtle texture overlay (NEW) -- */
.hero::before {
  content: '';
  position: absolute;
  top: 32px;
  left: 24px;
  right: 24px;
  bottom: calc(100% - 32px - min(42vh, 420px));
  background: var(--gradient-overlay);
  border-radius: var(--radius-md);
  pointer-events: none;
  z-index: 1;
}

.hero-cover:hover {
  box-shadow: var(--shadow-lg);
}

.hero-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 16px;
  padding-bottom: 14px;
  border-bottom: 3px double var(--ink);
  flex-wrap: wrap;
  gap: 10px;
  position: relative;
}

/* -- Decorative diamond on hero bar (NEW) -- */
.hero-bar::after {
  content: '';
  position: absolute;
  bottom: -5px;
  left: 50%;
  transform: translateX(-50%) rotate(45deg);
  width: 8px;
  height: 8px;
  background: var(--paper);
  border: 2px solid var(--ink);
}

.hero-issue {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--ink-muted);
  letter-spacing: 0.02em;
}


/* ============================================================
   6. CATEGORY PILLS
   ============================================================ */

.cat-nav {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 20px 24px 10px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.cat-pill {
  font-family: var(--font-mono);
  font-size: 0.74rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--accent);
  background: var(--accent-bg);
  padding: 6px 14px;
  border-radius: var(--radius-full);
  cursor: pointer;
  transition: all var(--transition-base);
  border: 1px solid transparent;
  position: relative;
  overflow: hidden;
}

.cat-pill::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--gradient-accent);
  opacity: 0;
  transition: opacity var(--transition-base);
  z-index: 0;
}

.cat-pill span,
.cat-pill {
  position: relative;
  z-index: 1;
}

.cat-pill:hover {
  color: white;
  border-color: var(--accent);
  transform: scale(1.03);
  box-shadow: var(--shadow-sm);
}

.cat-pill:hover::after {
  opacity: 1;
}

.cat-pill:active {
  transform: scale(0.98);
}


/* ============================================================
   7. TODAY'S BRIEF SECTION
   ============================================================ */

.brief-section {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 28px 24px 16px;
}

.brief-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.brief-title {
  font-family: var(--font-display);
  font-size: clamp(1.15rem, 2.5vw, 1.6rem);
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
  letter-spacing: 0.01em;
}

.brief-title::before {
  content: '';
  display: block;
  width: 5px;
  height: clamp(1.15rem, 2.5vw, 1.6rem);
  background: var(--gradient-accent);
  border-radius: 3px;
}

/* -- Brief Grid (equal height cards) -- */
.brief-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 14px;
}

/* FIX 2: brief-item 确保 flex 列布局且高度填满 */
.brief-item {
  display: flex;
  flex-direction: column;
  height: 100%;
}

/* FIX 2: 标题区域自适应填充剩余空间 */
.brief-item .brief-title {
  flex: 1;
}

.brief-item {
  background: var(--paper-card);
  background: var(--gradient-warm);
  border: 1px solid var(--rule-soft);
  border-radius: var(--radius-md);
  padding: 18px;
  cursor: pointer;
  transition: all var(--transition-base);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

/* -- Subtle corner accent on cards (NEW) -- */
.brief-item::before {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  width: 40px;
  height: 40px;
  background: linear-gradient(225deg, var(--paper-dark) 0%, transparent 60%);
  opacity: 0;
  transition: opacity var(--transition-base);
  border-radius: 0 0 0 40px;
}

.brief-item:hover {
  box-shadow: var(--shadow-lg);
  transform: translateY(-3px);
  border-color: var(--accent-soft);
}

.brief-item:hover::before {
  opacity: 1;
}

.brief-item:active {
  transform: translateY(-1px);
}

.brief-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.brief-num {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 900;
  color: var(--accent);
  opacity: 0.7;
  line-height: 1;
  text-shadow: 0 1px 2px rgba(139, 26, 26, 0.15);
  transition: all var(--transition-base);
  min-width: 24px;
  text-align: center;
}

.brief-item:hover .brief-num {
  opacity: 1;
  transform: scale(1.08);
  text-shadow: 0 2px 8px rgba(139, 26, 26, 0.25);
}

.brief-cat {
  font-family: var(--font-mono);
  font-size: 0.66rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--accent);
  background: var(--accent-bg);
  padding: 3px 8px;
  border-radius: var(--radius-sm);
}

.brief-item .brief-title {
  font-family: var(--font-serif);
  font-size: 0.95rem;
  font-weight: 600;
  line-height: 1.55;
  color: var(--ink);
  letter-spacing: 0.005em;
  word-break: keep-all;        /* 修正5: 不在单词中间换行 */
  overflow-wrap: break-word;   /* 修正5: 超长单词整体换行 */
}


/* ============================================================
   8. AUDIO PLAYER
   ============================================================ */

.audio-player {
  display: flex;
  align-items: center;
  gap: 16px;
  background: var(--paper-card);
  background: var(--gradient-warm);
  border: 1px solid var(--rule-soft);
  border-radius: var(--radius-lg);
  padding: 14px 18px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
  transition: box-shadow var(--transition-base);
}

.audio-player:hover {
  box-shadow: var(--shadow-md);
}

.audio-player.audio-disabled {
  opacity: 0.55;
  filter: grayscale(0.4);
}

.audio-play-btn {
  width: 48px;
  height: 48px;
  border-radius: var(--radius-full);
  background: var(--accent);
  background: var(--gradient-accent);
  border: none;
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all var(--transition-base);
  box-shadow: 0 2px 8px rgba(139, 26, 26, 0.25);
}

.audio-play-btn:hover {
  transform: scale(1.08);
  box-shadow: 0 4px 16px rgba(139, 26, 26, 0.35);
}

.audio-play-btn:active {
  transform: scale(0.96);
}

.audio-play-btn svg {
  width: 20px;
  height: 20px;
  fill: currentColor;
}

.audio-info {
  flex: 1;
  min-width: 0;
}

.audio-label {
  font-weight: 600;
  font-size: 0.96rem;
  letter-spacing: 0.01em;
}

.audio-desc {
  font-size: 0.8rem;
  color: var(--ink-muted);
  margin-top: 3px;
  letter-spacing: 0.01em;
}

.audio-progress-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
  max-width: 200px;
}

.audio-track {
  flex: 1;
  height: 5px;
  background: var(--rule-soft);
  border-radius: 3px;
  overflow: hidden;
  cursor: pointer;
  transition: height var(--transition-fast);
}

.audio-track:hover {
  height: 7px;
}

.audio-fill {
  height: 100%;
  background: var(--gradient-accent);
  width: 0%;
  transition: width 0.3s ease;
  border-radius: 3px;
}

.audio-time {
  font-family: var(--font-mono);
  font-size: 0.74rem;
  color: var(--ink-muted);
  white-space: nowrap;
  min-width: 40px;
  text-align: right;
  letter-spacing: 0.02em;
}


/* ============================================================
   9. SECTION DIVIDERS (Decorative)
   ============================================================ */

.section-divider {
  max-width: var(--max-width);
  margin: 36px auto 10px;
  padding: 0 24px;
}

.section-divider-inner {
  border-top: 1px solid var(--rule);
  padding-top: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: relative;
}

/* -- Center decorative diamond (NEW) -- */
.section-divider-inner::before {
  content: '';
  position: absolute;
  top: -5px;
  left: 0;
  width: 8px;
  height: 8px;
  background: var(--accent);
  transform: rotate(45deg);
  border-radius: 1px;
}

/* -- Right gradient fade (NEW) -- */
.section-divider-inner::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--gradient-rule);
}

.section-label {
  font-family: var(--font-display);
  font-size: clamp(1.05rem, 2vw, 1.35rem);
  font-weight: 700;
  letter-spacing: 0.02em;
  display: flex;
  align-items: center;
  gap: 10px;
  white-space: nowrap;
  text-shadow: 0 1px 1px rgba(0, 0, 0, 0.04);
}

.section-label::before {
  content: '';
  display: inline-block;
  width: 5px;
  height: clamp(1.05rem, 2vw, 1.35rem);
  background: var(--gradient-accent);
  border-radius: 3px;
  margin-right: 0;
  vertical-align: middle;
}

/* -- Enhanced decorative divider variant (NEW) -- */
.section-divider-decorated .section-divider-inner {
  border-top: none;
  padding-top: 20px;
  justify-content: center;
}

.section-divider-decorated .section-divider-inner::before {
  display: none;
}

.section-divider-decorated .section-divider-inner::after {
  display: none;
}

.section-divider-line {
  flex: 1;
  height: 1px;
  background: var(--gradient-rule);
  max-width: 200px;
}

.section-divider-dots {
  display: flex;
  gap: 6px;
  align-items: center;
  padding: 0 12px;
}

.section-divider-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--rule);
}

.section-divider-dot:nth-child(2) {
  background: var(--accent);
  width: 7px;
  height: 7px;
}

.section-divider-diamond {
  width: 8px;
  height: 8px;
  background: var(--accent);
  transform: rotate(45deg);
  border-radius: 1px;
  opacity: 0.7;
}


/* ============================================================
   10. STORIES (Detailed Articles)
   ============================================================ */

.stories {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 16px 24px 48px;
}

.story {
  padding: 36px 0;
  border-bottom: 1px solid var(--rule-soft);
  position: relative;
  transition: padding var(--transition-base);
}

.story:last-child {
  border-bottom: none;
}

/* -- Subtle hover highlight on stories (NEW) -- */
.story::before {
  content: '';
  position: absolute;
  inset: 16px -20px;
  background: var(--accent-bg);
  opacity: 0;
  border-radius: var(--radius-lg);
  transition: opacity var(--transition-base);
  pointer-events: none;
  z-index: 0;
}

.story:hover::before {
  opacity: 0.5;
}

.story > * {
  position: relative;
  z-index: 1;
}

/* -- Story Header -- */
.story-header {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 14px;
}

/* -- Enhanced Story Number (NEW decorative circle) -- */
.story-num {
  font-family: var(--font-display);
  font-size: clamp(1.8rem, 3.5vw, 2.6rem);
  font-weight: 900;
  color: var(--accent);
  line-height: 0.85;
  flex-shrink: 0;
  opacity: 0.8;
  width: 56px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--accent-bg);
  border-radius: var(--radius-full);
  border: 2px solid rgba(139, 26, 26, 0.12);
  transition: all var(--transition-base);
  text-shadow: 0 1px 2px rgba(139, 26, 26, 0.15);
}

.story:hover .story-num {
  opacity: 1;
  background: var(--accent);
  color: var(--paper-card);
  border-color: var(--accent);
  box-shadow: 0 4px 16px rgba(139, 26, 26, 0.25);
  transform: scale(1.05);
}

.story-title-block {
  flex: 1;
  padding-top: 4px;
}

.story-categories {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}

.story-cat {
  font-family: var(--font-mono);
  font-size: 0.66rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--accent);
  background: var(--accent-bg);
  padding: 4px 10px;
  border-radius: var(--radius-sm);
  transition: all var(--transition-fast);
}

.story-cat:hover {
  background: var(--accent);
  color: var(--paper-card);
}

/* -- Story Title with animated underline (NEW) -- */
.story-title {
  font-family: var(--font-serif);
  font-size: clamp(1.18rem, 2.2vw, 1.55rem);
  font-weight: 700;
  line-height: 1.35;
  letter-spacing: 0.01em;
}

.story-title a {
  color: var(--ink);
  transition: color var(--transition-fast);
  position: relative;
  display: inline;
}

/* -- Animated underline on hover (NEW) -- */
.story-title a::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  width: 0;
  height: 2px;
  background: var(--gradient-accent);
  transition: width 0.35s ease;
  border-radius: 1px;
}

.story-title a:hover {
  color: var(--accent);
}

.story-title a:hover::after {
  width: 100%;
}

/* -- Summary Box with italic and decorative quotes (NEW) -- */
.story-summary {
  font-family: var(--font-serif);
  font-size: clamp(0.92rem, 1.4vw, 1.02rem);
  line-height: 1.75;
  color: var(--ink-soft);
  padding: 14px 18px;
  border-left: 4px solid var(--accent);
  background: var(--accent-bg);
  border-radius: 0 var(--radius-md) var(--radius-md) 0;
  margin: 16px 0;
  position: relative;
  font-style: italic;
  letter-spacing: 0.01em;
}

/* -- Opening quote decoration (NEW) -- */
.story-summary::before {
  content: '\201C';
  position: absolute;
  top: 4px;
  left: 10px;
  font-family: var(--font-display);
  font-size: 2.5rem;
  color: var(--accent);
  opacity: 0.12;
  line-height: 1;
  pointer-events: none;
}

/* -- Story Images -- */
.story-images {
  display: flex;
  gap: 14px;
  margin: 20px 0;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 6px;
  scrollbar-width: thin;
  scrollbar-color: var(--rule) transparent;
  justify-content: center;
  align-items: center;
}

.story-images::-webkit-scrollbar {
  height: 4px;
}

.story-images::-webkit-scrollbar-thumb {
  background: var(--rule);
  border-radius: 2px;
}

.story-images img {
  width: auto;
  max-width: 100%;
  max-height: 340px;
  object-fit: cover;
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  flex-shrink: 0;
  cursor: pointer;
  transition: all var(--transition-base);
  border: 1px solid transparent;
}

.story-images img:hover {
  transform: scale(1.02) translateY(-2px);
  box-shadow: var(--shadow-md);
  border-color: var(--rule-soft);
}

/* -- Enhanced Story Body Typography (NEW) -- */
.story-body {
  font-size: clamp(0.92rem, 1.3vw, 1rem);
  line-height: 1.9;
  color: var(--ink-soft);
  max-width: var(--reading-width);
  letter-spacing: 0.01em;
}

/* -- Modern paragraph spacing (replaces text-indent) -- */
.story-body p {
  margin-bottom: 1.2em;
  text-indent: 0;
}

.story-body p:last-child {
  margin-bottom: 0;
}

/* -- First letter styling for first paragraph (NEW) -- */
/* 修正6: 调整首字下沉样式，避免与正文重叠 */
.story-body > p:first-of-type::first-letter {
  font-family: var(--font-display);
  font-size: 3.0em;            /* 从3.2em略降为3.0em，减少侵占空间 */
  font-weight: 700;
  float: left;
  line-height: 0.85;           /* 从0.8提高到0.85，增加行间距 */
  margin-right: 8px;           /* 从6px增加到8px，与正文保持更大间距 */
  margin-top: 2px;             /* 从4px降为2px，减少对上方空间的侵占 */
  margin-bottom: 2px;          /* 新增：确保下方段落不与首字重叠 */
  color: var(--accent);
  text-shadow: 1px 1px 0 rgba(139, 26, 26, 0.15);
}

/* -- Story body emphasis styling (NEW) -- */
.story-body strong {
  color: var(--ink);
  font-weight: 600;
}

.story-body em {
  color: var(--ink-soft);
  font-style: italic;
}


/* ============================================================
   11. TECH TERMS & TOOLTIPS
   ============================================================ */

.tech-term {
  color: var(--accent);
  cursor: pointer;
  font-weight: 500;
  padding: 0 3px;
  transition: all var(--transition-fast);
  border-radius: 3px;
  white-space: nowrap;
  display: inline;
  border-bottom: 1px dashed var(--accent-soft);
  position: relative;
}

.tech-term:hover {
  background: var(--accent);
  color: var(--paper-card);
  border-bottom-color: transparent;
}

/* -- Tooltip on hover (NEW) -- */
.tech-term[data-tooltip]::before {
  content: attr(data-tooltip);
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%) scale(0.95);
  background: var(--ink);
  color: var(--paper-card);
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  font-size: 0.75rem;
  font-family: var(--font-sans);
  font-weight: 400;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: all var(--transition-fast);
  z-index: 50;
  box-shadow: var(--shadow-md);
  letter-spacing: 0.01em;
}

.tech-term[data-tooltip]::after {
  content: '';
  position: absolute;
  bottom: calc(100% + 3px);
  left: 50%;
  transform: translateX(-50%) scale(0.95);
  border: 5px solid transparent;
  border-top-color: var(--ink);
  opacity: 0;
  transition: all var(--transition-fast);
  z-index: 50;
}

.tech-term[data-tooltip]:hover::before,
.tech-term[data-tooltip]:hover::after {
  opacity: 1;
  transform: translateX(-50%) scale(1);
}


/* ============================================================
   12. MODAL ENHANCEMENTS
   ============================================================ */

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
  opacity: 0;
  transition: opacity 0.25s ease;
}

.modal-overlay.active {
  display: flex;
  opacity: 1;
}

.modal {
  background: var(--paper-card);
  border-radius: var(--radius-lg);
  max-width: 340px;
  width: auto;
  max-height: 60vh;
  overflow-y: auto;
  box-shadow: var(--shadow-xl);
  animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  border: 1px solid var(--rule-soft);
  position: relative;
}

/* -- Modal decorative corner (NEW) -- */
.modal::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: var(--gradient-accent);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
}

@keyframes modalIn {
  from {
    opacity: 0;
    transform: scale(0.92) translateY(16px);
  }
  to {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}

.modal-header {
  padding: 22px 24px 14px;
  border-bottom: 1px solid var(--rule-soft);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
}

.modal-term {
  font-family: var(--font-display);
  font-size: 1.05rem;
  font-weight: 700;
  letter-spacing: 0.01em;
  color: var(--ink);
}

.modal-close {
  background: none;
  border: none;
  font-size: 1.6rem;
  color: var(--ink-muted);
  cursor: pointer;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  transition: all var(--transition-fast);
  line-height: 1;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-close:hover {
  color: var(--accent);
  background: var(--accent-bg);
  transform: rotate(90deg);
}

.modal-body {
  padding: 12px 16px 16px;
  font-size: 0.82rem;
  line-height: 1.6;
  color: var(--ink-soft);
  letter-spacing: 0.01em;
}

.modal-body .tag {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 600;
  background: var(--paper-dark);
  padding: 4px 10px;
  border-radius: var(--radius-sm);
  margin-bottom: 10px;
  color: var(--ink-muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.modal-body p {
  margin-bottom: 0.8em;
}


/* ============================================================
   13. FOOTER
   ============================================================ */

.footer {
  background: var(--ink);
  color: rgba(245, 241, 232, 0.5);
  padding: 40px 24px;
  text-align: center;
  position: relative;
}

/* -- Decorative top border (NEW) -- */
.footer::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 3px;
  background: var(--gradient-accent);
  border-radius: 0 0 3px 3px;
}

.footer-brand {
  font-family: var(--font-display);
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--paper);
  letter-spacing: 0.02em;
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
}

.footer-brand .accent {
  color: var(--accent-soft);
}

.footer-info {
  font-size: 0.78rem;
  margin-top: 6px;
  letter-spacing: 0.02em;
}


/* ============================================================
   14. BACK TO TOP BUTTON
   ============================================================ */

.back-to-top {
  position: fixed;
  bottom: 28px;
  right: 28px;
  width: 48px;
  height: 48px;
  border-radius: var(--radius-full);
  background: var(--paper-card);
  color: var(--ink-muted);
  border: 1px solid var(--rule-soft);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-md);
  z-index: 150;
  opacity: 0;
  visibility: hidden;
  transform: translateY(12px);
  transition: all var(--transition-base);
  font-size: 1.2rem;
  line-height: 1;
}

.back-to-top.visible {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

.back-to-top:hover {
  background: var(--accent);
  color: var(--paper-card);
  border-color: var(--accent);
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
}

.back-to-top:active {
  transform: translateY(-1px) scale(0.96);
}

/* -- Progress ring (NEW) -- */
.back-to-top-ring {
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  border: 2px solid transparent;
  border-top-color: var(--accent);
  opacity: 0;
  transition: opacity var(--transition-base);
  transform: rotate(-90deg);
}

.back-to-top.visible .back-to-top-ring {
  opacity: 0.4;
}


/* ============================================================
   15. SCROLL ANIMATIONS (REVEAL)
   ============================================================ */

/* -- Base reveal -- */
.reveal {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}

.reveal.visible {
  opacity: 1;
  transform: translateY(0);
}

/* -- Stagger reveal for child elements (NEW) -- */
.reveal-stagger {
  opacity: 1;
  transform: none;
}

.reveal-stagger > * {
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}

.reveal-stagger.visible > *:nth-child(1) { transition-delay: 0ms; }
.reveal-stagger.visible > *:nth-child(2) { transition-delay: 60ms; }
.reveal-stagger.visible > *:nth-child(3) { transition-delay: 120ms; }
.reveal-stagger.visible > *:nth-child(4) { transition-delay: 180ms; }
.reveal-stagger.visible > *:nth-child(5) { transition-delay: 240ms; }
.reveal-stagger.visible > *:nth-child(6) { transition-delay: 300ms; }
.reveal-stagger.visible > *:nth-child(7) { transition-delay: 360ms; }
.reveal-stagger.visible > *:nth-child(8) { transition-delay: 420ms; }
.reveal-stagger.visible > *:nth-child(9) { transition-delay: 480ms; }
.reveal-stagger.visible > *:nth-child(10) { transition-delay: 540ms; }

.reveal-stagger.visible > * {
  opacity: 1;
  transform: translateY(0);
}

/* -- Reveal variants (NEW) -- */
.reveal-fade {
  opacity: 0;
  transition: opacity 0.6s ease;
}

.reveal-fade.visible {
  opacity: 1;
}

.reveal-scale {
  opacity: 0;
  transform: scale(0.96);
  transition: opacity 0.5s ease, transform 0.5s ease;
}

.reveal-scale.visible {
  opacity: 1;
  transform: scale(1);
}

.reveal-left {
  opacity: 0;
  transform: translateX(-20px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}

.reveal-left.visible {
  opacity: 1;
  transform: translateX(0);
}


/* ============================================================
   16. DECORATIVE ELEMENTS
   ============================================================ */

/* -- Ornamental divider line (NEW) -- */
.ornament-line {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: var(--space-lg) 0;
}

.ornament-line::before,
.ornament-line::after {
  content: '';
  flex: 1;
  max-width: 160px;
  height: 1px;
  background: var(--gradient-rule);
}

.ornament-diamond {
  width: 7px;
  height: 7px;
  background: var(--accent);
  transform: rotate(45deg);
  border-radius: 1px;
  opacity: 0.6;
}

/* -- Decorative section number badge (NEW) -- */
.section-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  background: var(--accent);
  color: var(--paper-card);
  font-family: var(--font-display);
  font-size: 0.8rem;
  font-weight: 700;
  border-radius: 50%;
  box-shadow: 0 2px 8px rgba(139, 26, 26, 0.25);
}

/* -- Quote marks decoration (NEW) -- */
.quote-open,
.quote-close {
  font-family: var(--font-display);
  font-size: 2rem;
  line-height: 1;
  color: var(--accent);
  opacity: 0.2;
  display: inline-block;
  vertical-align: text-top;
}

.quote-open {
  margin-right: 2px;
}

.quote-close {
  margin-left: 2px;
}

/* -- Reading progress bar (NEW) -- */
.reading-progress {
  position: fixed;
  top: 0;
  left: 0;
  height: 3px;
  background: var(--gradient-accent);
  z-index: 300;
  width: 0%;
  transition: width 0.1s linear;
  box-shadow: 0 1px 4px rgba(139, 26, 26, 0.25);
}


/* ============================================================
   17. KEYFRAMES
   ============================================================ */

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeInScale {
  from {
    opacity: 0;
    transform: scale(0.95);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

@keyframes slideInLeft {
  from {
    opacity: 0;
    transform: translateX(-20px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

@keyframes pulse {
  0%, 100% {
    transform: scale(1);
    opacity: 1;
  }
  50% {
    transform: scale(1.05);
    opacity: 0.8;
  }
}

@keyframes shimmer {
  0% {
    background-position: -200% 0;
  }
  100% {
    background-position: 200% 0;
  }
}

@keyframes float {
  0%, 100% {
    transform: translateY(0);
  }
  50% {
    transform: translateY(-6px);
  }
}

@keyframes rotateIn {
  from {
    opacity: 0;
    transform: rotate(-180deg) scale(0.5);
  }
  to {
    opacity: 1;
    transform: rotate(0) scale(1);
  }
}

@keyframes bounceIn {
  0% {
    opacity: 0;
    transform: scale(0.3);
  }
  50% {
    transform: scale(1.05);
  }
  70% {
    transform: scale(0.9);
  }
  100% {
    opacity: 1;
    transform: scale(1);
  }
}


/* ============================================================
   18. RESPONSIVE DESIGN
   ============================================================ */

/* -- Tablet (768px - 1024px) -- */
@media (min-width: 768px) and (max-width: 1024px) {
  .brief-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .story-num {
    width: 48px;
    height: 48px;
    font-size: clamp(1.6rem, 3vw, 2rem);
  }

  .story-title {
    font-size: clamp(1.1rem, 2vw, 1.35rem);
  }

  .story-images img {
    max-height: 280px;
  }
}

/* -- Mobile (max-width: 767px) -- */
@media (max-width: 767px) {
  /* Layout adjustments */
  .float-nav {
    top: 72px;
    left: 14px;
  }

  .float-btn {
    width: 42px;
    height: 42px;
    font-size: 1.1rem;
  }

  .masthead-inner {
    padding: 0 16px;
    flex-wrap: wrap;
    gap: 6px;
  }

  .masthead-sub {
    display: none;
  }

  .masthead-title {
    font-size: clamp(1.3rem, 5vw, 1.8rem);
    letter-spacing: 0.01em;
  }

  /* Hero */
  .hero {
    padding: 20px 16px 10px;
  }

  .hero-cover {
    max-height: 220px;
    border-radius: var(--radius-sm);
  }

  .hero-bar {
    margin-top: 10px;
    padding-bottom: 10px;
  }

  .hero-bar::after {
    width: 6px;
    height: 6px;
  }

  /* Category pills */
  .cat-nav {
    padding: 14px 16px 6px;
  }

  .cat-pill {
    font-size: 0.7rem;
    padding: 5px 12px;
  }

  /* Brief section */
  .brief-section {
    padding: 20px 16px 10px;
  }

  .brief-grid {
    grid-template-columns: 1fr;
    gap: 12px;
  }

  .brief-item {
    padding: 16px;
  }

  .brief-num {
    font-size: 1.3rem;
  }

  /* Audio player */
  .audio-player {
    flex-wrap: wrap;
    gap: 10px;
    padding: 12px 14px;
  }

  .audio-progress-wrap {
    width: 100%;
    max-width: none;
  }

  .audio-play-btn {
    width: 44px;
    height: 44px;
  }

  /* Section dividers */
  .section-divider {
    margin: 28px auto 8px;
    padding: 0 16px;
  }

  .section-divider-inner {
    padding-top: 12px;
  }

  /* Stories */
  .stories {
    padding: 10px 16px 32px;
  }

  .story {
    padding: 28px 0;
  }

  .story::before {
    inset: 8px -10px;
  }

  .story-num {
    font-size: 1.4rem;
    width: 44px;
    height: 44px;
  }

  .story-title {
    font-size: 1.08rem;
  }

  .story-summary {
    font-size: 0.9rem;
    padding: 10px 14px;
    margin: 12px 0;
  }

  .story-summary::before {
    font-size: 2rem;
  }

  .story-images {

   ============================================================ */

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {

    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;

  .reveal,
  .reveal-fade,
  .reveal-scale,
  .reveal-left,
  .reveal-stagger > * {

/* ========================================
   DOUKNOW PET STYLES
   ======================================== */

/**
 * douknow-pet.css - Styles for DouknowAI (豆懂AI) Pet Party
 * 
 * Provides canvas positioning, container styles, and optional
 * visual enhancements for the pet animation system.
 */

/* ============================================
   Pet Party Container
   ============================================ */

/**
 * Default container for the pet party canvas.
 * The canvas covers the full viewport and pets walk freely across the page.
 * 
 * Usage: <div id="douknow-pet-party" class="douknow-pet-container"></div>
 */
.douknow-pet-container {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 250px;
  pointer-events: none;
  z-index: 50;
  overflow: hidden;
}

/**
 * Alternative: Full-page overlay mode
 * Pets can walk anywhere on the page
 */
.douknow-pet-container.douknow-pet-container--fullpage {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  bottom: auto;
}

/**
 * Alternative: Section-contained mode
 * Pets walk within a specific section of the page
 */
.douknow-pet-container.douknow-pet-container--inline {
  position: relative;
  width: 100%;
  height: 200px;
  bottom: auto;
  left: auto;
}

/* ============================================
   Canvas Element
   ============================================ */

.douknow-pet-canvas {
  display: block;
  width: 100%;
  height: 100%;
  pointer-events: none;
  /* Hardware acceleration for smooth rendering */
  transform: translateZ(0);
  will-change: contents;
}

/* ============================================
   Optional: Section Integration Styles
   ============================================ */

/**
 * When integrating into a specific section,
 * use this wrapper to position pets at the bottom of that section.
 */
.douknow-pet-section {
  position: relative;
  /* Ensure section has enough space for pets */
  min-height: 300px;
}

.douknow-pet-section .douknow-pet-container {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 180px;
}

/* ============================================
   Optional: Interactive Mode
   ============================================ */

/**
 * When pointer-events are enabled on the canvas,
 * pets can be clicked for interaction.
 */
.douknow-pet-container.douknow-pet-container--interactive {
  pointer-events: auto;
}

.douknow-pet-container.douknow-pet-container--interactive .douknow-pet-canvas {
  pointer-events: auto;
  cursor: crosshair;
}

/* ============================================
   Optional: Loading State
   ============================================ */

.douknow-pet-container.douknow-pet-container--loading::before {
  content: '';
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 30px;
  height: 30px;
  border: 3px solid rgba(74, 222, 128, 0.2);
  border-top-color: rgba(74, 222, 128, 0.8);
  border-radius: 50%;
  animation: douknow-pet-spin 0.8s linear infinite;
}

@keyframes douknow-pet-spin {
  to {
    transform: translateX(-50%) rotate(360deg);
  }
}

/* ============================================
   Optional: Toggle Button
   ============================================ */

.douknow-pet-toggle {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.9);
  border: 2px solid rgba(74, 222, 128, 0.5);
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  z-index: 100;
  transition: all 0.3s ease;
  pointer-events: auto;
}

.douknow-pet-toggle:hover {
  background: rgba(74, 222, 128, 0.2);
  border-color: rgba(74, 222, 128, 0.8);
  transform: scale(1.1);
}

.douknow-pet-toggle:active {
  transform: scale(0.95);
}

.douknow-pet-toggle.douknow-pet-toggle--hidden {
  opacity: 0.5;
}

/* ============================================
   Mobile Adaptations
   ============================================ */

@media (max-width: 768px) {
  .douknow-pet-container {
    height: 180px;
  }

  .douknow-pet-container.douknow-pet-container--fullpage {
    height: 100vh;
  }

  .douknow-pet-section .douknow-pet-container {
    height: 140px;
  }

  .douknow-pet-toggle {
    width: 38px;
    height: 38px;
    font-size: 16px;
    bottom: 15px;
    right: 15px;
  }
}
